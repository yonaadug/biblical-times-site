<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Thank you — Biblical Times</title>
<meta name="description" content="Thank you for supporting Biblical Times.">
<link rel="stylesheet" href="styles.css">
<style>
  /* ───────── Thanks-page specific styles ───────── */

  body { overflow-x: hidden; }

  .thanks-hero {
    text-align: center;
    padding: 6vh 0 0;
    position: relative;
    z-index: 1;
  }

  .thanks-eyebrow {
    font-family: 'Lora', serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--gold, #B08537);
    opacity: 0;
    animation: fade-up 0.9s ease 0.2s forwards;
  }

  .thanks-title {
    font-family: 'Cormorant Garamond', 'Lora', serif;
    font-weight: 500;
    font-size: clamp(64px, 14vw, 110px);
    line-height: 0.95;
    letter-spacing: -2px;
    color: var(--text, #26231D);
    margin-top: 18px;
    text-wrap: balance;
    opacity: 0;
    transform: translateY(20px) scale(0.96);
    animation: title-in 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
  }

  .thanks-rule {
    width: 64px;
    height: 1px;
    background: var(--maroon, #8A3324);
    margin: 28px auto 0;
    transform: scaleX(0);
    transform-origin: center;
    animation: scale-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.3s forwards;
  }

  .thanks-lead {
    font-family: 'Cormorant Garamond', 'Lora', serif;
    font-style: italic;
    font-size: clamp(20px, 3.4vw, 26px);
    line-height: 1.4;
    color: var(--text, #26231D);
    text-wrap: balance;
    margin: 28px auto 0;
    max-width: 28ch;
    opacity: 0;
    animation: fade-up 0.9s ease 1.6s forwards;
  }

  .thanks-coda {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--text-muted, #6B6457);
    margin-top: 32px;
    opacity: 0;
    animation: fade-up 0.9s ease 2.1s forwards;
  }

  .thanks-coda strong {
    color: var(--maroon, #8A3324);
    font-style: normal;
    font-weight: 500;
  }

  .thanks-back {
    margin-top: 56px;
    opacity: 0;
    animation: fade-up 0.9s ease 2.6s forwards;
  }

  .thanks-back a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: var(--maroon, #8A3324);
    color: var(--paper, #FBF8F0);
    border-radius: 999px;
    font-family: 'Lora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.3px;
    box-shadow: 0 2px 0 rgba(110, 40, 24, 0.18);
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .thanks-back a:hover {
    background: var(--maroon-deep, #6E2818);
    transform: translateY(-1px);
  }

  /* A subtle radial glow that pulses behind the title — like a flash of gold */
  .thanks-hero::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 40%;
    width: 700px;
    height: 700px;
    transform: translate(-50%, -50%) scale(0.6);
    background: radial-gradient(circle, rgba(176, 133, 55, 0.18) 0%, rgba(176, 133, 55, 0) 70%);
    z-index: -1;
    opacity: 0;
    animation: glow 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    pointer-events: none;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes title-in {
    from { opacity: 0; transform: translateY(24px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes scale-in {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  @keyframes glow {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    35%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0.35; transform: translate(-50%, -50%) scale(1.1); }
  }

  @media (prefers-color-scheme: dark) {
    .thanks-back a { background: #D9624D; color: #1A1814; }
    .thanks-back a:hover { background: #C44A38; }
  }

  @media (prefers-reduced-motion: reduce) {
    .thanks-eyebrow, .thanks-title, .thanks-rule, .thanks-lead,
    .thanks-coda, .thanks-back, .thanks-hero::before {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }
</style>
</head>
<body>

<div class="wrap">

  <header class="masthead">
    <a href="index.html"><h1>Biblical Times</h1></a>
  </header>

  <section class="thanks-hero">
    <div class="thanks-eyebrow">Reader support</div>
    <h2 class="thanks-title">Thank you.</h2>
    <div class="thanks-rule"></div>
    <p class="thanks-lead">Your contribution keeps Biblical Times free for every reader.</p>
    <p class="thanks-coda">We&rsquo;ll see you <strong>Sunday</strong>.</p>

    <div class="thanks-back">
      <a href="index.html">Back to Biblical Times</a>
    </div>
  </section>

  <div class="footer" style="margin-top: 12vh;">
    <div class="footer-nav">
      <a href="privacy.html">Privacy</a> ·
      <a href="support.html">Support</a>
    </div>
    <div class="colophon">Biblical Times LLC · Est. MMXXVI</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
  (function () {
    if (typeof confetti !== 'function') return;
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      return;
    }

    // Brand colors — cream/maroon/gold/ink. Editorial, not arcade.
    const palette = ['#8A3324', '#B08537', '#26231D', '#6E2818', '#D9A964', '#F4ECDC'];

    // Use the global confetti() — it auto-creates its own full-viewport
    // canvas at the right z-index. Trying to BYO canvas with confetti.create
    // had a silent-no-draw bug across browsers we couldn't reproduce
    // consistently. The auto-canvas path Just Works.
    function burst(x, y, count, scalar, startVelocity) {
      confetti({
        particleCount: count,
        startVelocity: startVelocity,
        spread: 360,
        ticks: 200,
        origin: { x: x, y: y },
        colors: palette,
        scalar: scalar,
        shapes: ['circle', 'square'],
        zIndex: 100,
        gravity: 0.9,
        decay: 0.92,
        disableForReducedMotion: true,
      });
    }

    // Big initial pop at the center.
    setTimeout(function () { burst(0.5, 0.35, 140, 1.0, 50); }, 350);

    // Side bursts for fireworks feel.
    setTimeout(function () { burst(0.2, 0.45, 70, 0.9, 38); }, 700);
    setTimeout(function () { burst(0.8, 0.45, 70, 0.9, 38); }, 900);

    // Second wave for depth.
    setTimeout(function () { burst(0.5, 0.5, 90, 0.8, 32); }, 1500);
    setTimeout(function () { burst(0.3, 0.6, 50, 0.7, 26); }, 2100);
    setTimeout(function () { burst(0.7, 0.6, 50, 0.7, 26); }, 2400);

    // Final gentle sparkle.
    setTimeout(function () { burst(0.5, 0.45, 60, 0.6, 22); }, 3400);
  })();
</script>

</body>
</html>
